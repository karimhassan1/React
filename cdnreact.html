<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cdnreact</title>

</head>
<body>

    <div id="parent">
        <h1>this is heading</h1>
    </div>
    <div id="papa">

    </div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    
    <script>
        const createElement = document.createElement("h1");
        createElement.innerText = "This is append child";
        const parent = document.getElementById("parent");
        parent.appendChild(createElement);

        const heading = React.createElement("h1",{},"This is react child");
        const papa = ReactDOM.createRoot(document.getElementById("papa"));
        papa.render(heading);
    </script>
    
</body>
</html>
